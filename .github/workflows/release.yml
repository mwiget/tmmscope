name: release

# On a version tag: publish the multi-arch tmm-stat-exporter image to ghcr and
# build the tmmscope CLI binaries with goreleaser.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # goreleaser creates the GitHub release
  packages: write   # push to ghcr.io

jobs:
  exporter-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push multi-arch exporter
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/tmm-stat-exporter/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/mwiget/tmm-stat-exporter:${{ github.ref_name }}
            ghcr.io/mwiget/tmm-stat-exporter:latest

  cli-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
