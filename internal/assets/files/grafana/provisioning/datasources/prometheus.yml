apiVersion: 1

# Grafana and Prometheus share the tmmscope compose network, so Grafana reaches
# Prometheus by its service name on the in-container port (9090). The host-side
# published port (default 9491, auto-negotiated) is only for external producers
# pushing remote_write — it is not used here.
datasources:
  - name: tmm-telemetry
    uid: tmm-telemetry
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 2s   # the exporter pushes every ~2s
    editable: false
